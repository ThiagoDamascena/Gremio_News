services:
  db:
    image: mariadb:12
    container_name: gremio_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: "190326"
      MARIADB_DATABASE: gremio_estudantil
      MARIADB_USER: "eva_admin"
      MARIADB_PASSWORD: "190326"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p190326"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Backend
    container_name: gremio_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: eva_admin
      DB_PASSWORD: 190326
      DB_NAME: gremio_estudantil
    volumes:
      - ./Backend:/app
      - ./Frontend:/Frontend

volumes:
  db_data: