<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grêmio News</title>
    <script src="../Login_Page/index_login.js" defer></script>
    <link rel="icon" type="image/png" href="../Pictures/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles_home.css">
    <script src="script_home.js" defer></script>
</head>
<body>

    <!-- Container principal da página -->
    <div class="conteiner">

        <!-- =====Topo da página===== -->   
        <div class="top">

            <div class="caixaTopo">

                <!-- Área da logo -->
                <div class="caixaLogo">

                    <!-- Imagem da logo -->
                    <div> <img src="/Frontend/assets/Pictures/favicon.png" alt="" class="logo"></div>
                    
                    <!-- Texto da logo -->
                    <div class="textoLogo">Instituto <br> Federal de Pernambuco</div>
                </div>

                <!-- Área de pesquisa e atalhos -->
                <div class="caixaPesquisa">
                    <a href="../login/index_login.html" class="settings"><button class="settings"></button></a>

                    <!-- Barra de navegação Bootstrap -->
                    <nav class="navbar bg-body-tertiary">
                        <div class="container-fluid">

                            <!-- Formulário de pesquisa -->
                                <form class="d-flex" role="search">

                                    <!-- Campo de pesquisa -->
                                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>

                                <!-- Botão de pesquisa -->
                                <button class="btn btn-outline-success" type="submit">Search</button>
                            </form>
                        </div>
                    </nav>

                    <!-- Link para Instagram -->
                    <a href="https://www.instagram.com/evagremioestudantil" target="_blank" class="redirecionamento">
                        <img src="/Frontend/assets/Pictures/instagram.png" alt="" class="redirecionamento">
                    </a>
                </div>
            </div>

        </div>

        <!-- ======CONTEÚDO PRINCIPAL------>

        <div class="main">
            
            <!-- Carrossel de notícias em destaque -->
            <div id="carouselExampleRide" class="carousel slide caixaLastNews" data-bs-ride="true">
                <div class="carousel-inner lastNews">

                    <!-- Primeiro slide -->
                    <div class="carousel-item active">
                        <img src="/Frontend/assets/Pictures/foto1.jpg" class="d-block w-100" alt="...">
                    </div>

                    <!-- Segundo slide -->
                    <div class="carousel-item">
                        <img src="/Frontend/assets/Pictures/foto1.jpg" class="d-block w-100" alt="...">
                    </div>

                    <!-- Terceiro slide -->
                    <div class="carousel-item">
                        <img src="/Frontend/assets/Pictures/foto1.jpg" class="d-block w-100" alt="...">
                    </div>
                </div>

                <!-- Botão anterior -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>

                <!-- Botão próximo -->
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>

            <!-- Título da seção de notícias -->
            <div class="tituloNoticia">
                <h1>Notícias Recentes</h1>
            </div>

            <!-- Cards de notícias -->
            <div class="caixaNoticia">

                <!-- Notícia 1 -->
                <div class="noticia1">
                    <div>
                        <img src="" alt="" class="fotoNoticia1" id="imgNoticia1">
                    </div>

                    <!-- Título preenchido via JavaScript -->
                    <div class="tituloNoticia1"></div>

                    <div class="dataNoticia1"></div>

                    <!-- Conteúdo preenchido via JavaScript -->
                    <div class="conteudoNoticia1"></div>

                </div>

                <!-- Notícia 2 -->
                <div class="noticia2">
                    <div class="fotoNoticia2">
                        <img src="" alt="" class="fotoNoticia2" id="imgNoticia2" class="dataNoticia">
                    </div>

                    <div class="tituloNoticia2"></div>
                    <div class="dataNoticia2"></div>
                    <div class="conteudoNoticia2"></div>      
                </div>

                <!-- Notícia 3 -->
                <div class="noticia3">
                    <div class="fotoNoticia3">
                        <img src="" alt="" class="fotoNoticia3" id="imgNoticia3">
                    </div>

                    <div class="tituloNoticia3"></div>
                    <div class="dataNoticia3"></div>
                    <div class="conteudoNoticia3"></div>  
                </div>

            </div>

            
            <!-- Área para resumo ou destaque -->
            <div class="caixaResumo">
                <div class="previewResumo">resumo</div>
            </div>

        </div>
        <div class="rodape">rodape</div>
    </div>
</body>

</html>
